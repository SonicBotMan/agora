name: Bug Report
description: Report a bug in Agora
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: input
    id: version
    attributes:
      label: Agora Version
      description: What version of Agora are you using?
      placeholder: "e.g., 2026.6.1-preview.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Agent Engine
      description: Which engine were you using when the bug occurred?
      options:
        - OpenCode (default)
        - OpenClaw
        - Claude Code
        - Hermes
        - Codex
        - DeepSeek-TUI
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Agora
        2. Select engine '...'
        3. Send message '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output here.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
